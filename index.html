<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKC Guide — Food & Culture by Neighborhood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Archivo:wght@300;400;500;600&family=Archivo+Narrow:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #f0ece4;
  --ink2: #d8d2c8;
  --ink3: #b8b0a4;
  --mid: #8a8278;
  --dim: #5a5550;
  --rule: #2a2826;
  --rule2: #222020;
  --paper: #181614;
  --paper2: #141210;
  --paper3: #111010;
  --cream: #0e0d0c;
  --red: #c4523a;
  --gold: #c4a44a;
  /* control zone dark */
  --ctrl-bg: #161412;
  --ctrl-border: #2a2826;
  --ctrl-active: #f0ece4;
  --ctrl-dim: #5a5550;
  --ctrl-hover: #a09890;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Archivo', sans-serif;
  font-weight: 300;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}

/* MASTHEAD */
.masthead {
  border-bottom: 1px solid var(--rule);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 50px;
  background: var(--paper2);
}

.masthead-logo {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink);
}

.masthead-right {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}

/* HERO */
.hero {
  padding: 60px 32px 52px;
  border-bottom: 1px solid var(--rule);
  background: var(--cream);
}

.hero-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 40px;
}

.hero-eyebrow {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 16px;
  opacity: 0;
  animation: rise 0.5s ease 0.05s forwards;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(54px, 9vw, 112px);
  font-weight: 300;
  line-height: 0.9;
  letter-spacing: -0.025em;
  color: var(--ink);
  opacity: 0;
  animation: rise 0.6s ease 0.15s forwards;
}

h1 strong { font-weight: 700; display: block; }
h1 em { font-style: italic; color: var(--mid); }

.hero-sub {
  font-size: 13px;
  color: var(--mid);
  max-width: 340px;
  margin-top: 22px;
  line-height: 1.7;
  opacity: 0;
  animation: rise 0.6s ease 0.3s forwards;
}

.hero-stats {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: flex-end;
  opacity: 0;
  animation: rise 0.6s ease 0.4s forwards;
}

.s-row {
  text-align: right;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule2);
  min-width: 88px;
}
.s-row:last-child { border-bottom: none; padding-bottom: 0; }

.s-n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 600;
  line-height: 1;
  color: var(--ink);
  display: block;
}

.s-l {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
}

/* ── UNIFIED CONTROL ZONE ── */
.ctrl-zone {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--ctrl-bg);
  border-bottom: 1px solid var(--ctrl-border);
  backdrop-filter: blur(12px);
}

.ctrl-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px;
}

/* Row 1: district tabs */
.ctrl-districts {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--rule2);
  -webkit-overflow-scrolling: touch;
}
.ctrl-districts::-webkit-scrollbar { display: none; }

.nav-btn {
  background: none;
  border: none;
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ctrl-dim);
  padding: 12px 14px;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.nav-btn:hover { color: var(--ctrl-hover); }
.nav-btn.active { color: var(--ctrl-active); border-bottom-color: var(--ctrl-active); }

/* Row 2: category + search in same row */
.ctrl-bottom {
  display: flex;
  align-items: center;
  gap: 0;
}

.ctrl-cats {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.ctrl-cats::-webkit-scrollbar { display: none; }

.cat-btn {
  background: none;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ctrl-dim);
  padding: 9px 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s;
  flex-shrink: 0;
}
.cat-btn svg { flex-shrink: 0; opacity: 0.4; transition: opacity 0.15s; }
.cat-btn:hover { color: var(--ctrl-hover); }
.cat-btn:hover svg { opacity: 0.7; }
.cat-btn.active { color: var(--ctrl-active); }
.cat-btn.active svg { opacity: 1; }

.ctrl-search {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px 7px 12px;
  border-left: 1px solid var(--rule2);
}

.ctrl-search svg { color: var(--ctrl-dim); flex-shrink: 0; }

.ctrl-search input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 300;
  color: var(--ink);
  width: 180px;
}

.ctrl-search input::placeholder { color: var(--ctrl-dim); }

@media (max-width: 640px) {
  .ctrl-search input { width: 110px; }
}

/* MAIN */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px 96px;
}

/* DISTRICT BLOCK */
.district-block {
  border-top: 1px solid var(--rule);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.district-block.vis { opacity: 1; transform: none; }

.district-hd {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  padding: 26px 0 18px;
  cursor: pointer;
  user-select: none;
}

.district-hd:hover .d-title { color: var(--red); }

.d-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(24px, 3.2vw, 36px);
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: var(--ink);
  transition: color 0.15s;
}

.d-meta {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 5px;
}

.d-desc {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--mid);
  margin-top: 3px;
  max-width: 520px;
  line-height: 1.55;
}

.d-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  padding-top: 4px;
}

.d-chevron {
  width: 15px;
  height: 15px;
  color: var(--dim);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.district-block.collapsed .d-chevron { transform: rotate(-90deg); }

/* GRID */
.spots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 1px;
  background: var(--rule2);
  border: 1px solid var(--rule2);
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  max-height: 4000px;
  opacity: 1;
  margin-bottom: 0;
}

.district-block.collapsed .spots-grid { max-height: 0; opacity: 0; }

/* SPOT CARD */
.spot-card {
  background: var(--cream);
  padding: 17px 19px 15px;
  display: flex;
  flex-direction: column;
  transition: background 0.12s;
  min-height: 108px;
}

.spot-card:hover { background: var(--paper); }

.spot-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}

.spot-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--ink);
  flex: 1;
}

/* MUST: small diamond star, red, top-right corner */
.must-pip {
  flex-shrink: 0;
  margin-top: 2px;
  color: var(--red);
  display: flex;
  align-items: center;
}

.spot-tags {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

/* TAGS: text only, no box, no color fill */
.stag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mid);
}

.stag svg { color: var(--dim); flex-shrink: 0; }

.dot-sep {
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: var(--rule);
}

.st-open   { color: #3a7a55; }
.st-closed { color: var(--dim); }
.st-temp   { color: #8a6030; }
.st-soon   { color: #385d8a; }
.st-perm   { color: var(--rule); text-decoration: line-through; }

.spot-hours {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--dim);
  margin-top: 6px;
}

.spot-note {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--mid);
  line-height: 1.45;
  margin-top: 8px;
}

/* EMPTY */
.empty { display: none; text-align: center; padding: 96px 24px; }
.empty.vis { display: block; }
.empty p {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-style: italic;
  color: var(--dim);
}

/* FOOTER */
footer {
  border-top: 1px solid var(--rule);
  padding: 22px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: var(--paper2);
}

.foot-l {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
}

.foot-r {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--dim);
}

/* ANIMATION */
@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* RESPONSIVE */
@media (max-width: 640px) {
  .masthead, .hero, .search-zone, main, footer { padding-left: 16px; padding-right: 16px; }
  .nav-scroll, .cat-inner { padding-left: 16px; padding-right: 16px; }
  .hero-inner { grid-template-columns: 1fr; gap: 28px; }
  .hero-stats { flex-direction: row; align-items: flex-start; gap: 20px; }
  .s-row { text-align: left; }
  .spots-grid { grid-template-columns: 1fr; }
  .search-wrap { min-width: 0; width: 100%; }
  footer { flex-direction: column; gap: 6px; }
}
</style>

</head>
<body>

<div class="masthead">
  <div class="masthead-logo">OKC Guide</div>
  <div class="masthead-right">Oklahoma City</div>
</div>

<header class="hero">
  <div class="hero-inner">
    <div>
      <div class="hero-eyebrow">Food &amp; Culture by Neighborhood</div>
      <h1><strong>Oklahoma</strong> <em>City</em></h1>
      <p class="hero-sub">Every neighborhood, every vibe — curated by someone who actually lives here.</p>
    </div>
    <div class="hero-stats">
      <div class="s-row"><span class="s-n" id="statSpots">—</span><span class="s-l">Spots</span></div>
      <div class="s-row"><span class="s-n" id="statMust">—</span><span class="s-l">Must Visit</span></div>
      <div class="s-row"><span class="s-n" id="statDist">—</span><span class="s-l">Districts</span></div>
    </div>
  </div>
</header>

<div class="ctrl-zone">
  <div class="ctrl-inner">
    <div class="ctrl-districts" id="navScroll">
      <button class="nav-btn active" data-district="all">All</button>
    </div>
    <div class="ctrl-bottom">
      <div class="ctrl-cats" id="catInner">
        <button class="cat-btn active" data-cat="all">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="4" height="4" rx="0.5"/><rect x="7" y="1" width="4" height="4" rx="0.5"/><rect x="1" y="7" width="4" height="4" rx="0.5"/><rect x="7" y="7" width="4" height="4" rx="0.5"/></svg>
          All
        </button>
      </div>
      <div class="ctrl-search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search spots…" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>
</div>

<main id="mainContent">
  <div id="districtsWrap"></div>
  <div class="empty" id="emptyState"><p>No spots match that search.</p></div>
</main>

<footer>
  <div class="foot-l">OKC Guide &mdash; 2025</div>
  <div class="foot-r">Oklahoma City, Oklahoma</div>
</footer>

<script>
const ICONS = {
  mexican:    `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22C6.5 22 2 17.5 2 12S6.5 2 12 2s10 4.5 10 10-4.5 10-10 10z"/><path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4-4-1.8-4-4z"/></svg>`,
  restaurant: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>`,
  bar_drinks: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 22h8M12 11v11M3 3h18l-9 9-9-9z"/></svg>`,
  coffee:     `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>`,
  shop:       `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
  seafood:    `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12A10 10 0 1 1 2 12"/><path d="M22 12c-3 0-5-1-5-4s2-4 5-4"/><path d="M2 12c3 0 5 1 5 4s-2 4-5 4"/></svg>`,
  bakery:     `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>`,
  activity:   `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>`,
};

const CAT_LABELS = {
  mexican:    'Mexican & Latin',
  restaurant: 'Restaurant',
  bar_drinks: 'Bar & Drinks',
  coffee:     'Coffee',
  shop:       'Shop',
  seafood:    'Seafood',
  bakery:     'Bakery & Sweets',
  activity:   'Activity',
};

const STATUS_CFG = {
  'open':         { label: 'Open',          cls: 'st-open' },
  'closed-today': { label: 'Closed Today',  cls: 'st-closed' },
  'temp-closed':  { label: 'Temp Closed',   cls: 'st-temp' },
  'opening-soon': { label: 'Opening Soon',  cls: 'st-soon' },
  'perm-closed':  { label: 'Perm. Closed',  cls: 'st-perm' },
};

// Must visit: small filled diamond
const MUST_SVG = `<svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><polygon points="4,0 8,4 4,8 0,4"/></svg>`;

let DATA = null;
let activeDist = 'all';
let activeCat  = 'all';
let q = '';

async function load() {
  try {
    const r = await fetch('data.json?' + Date.now());
    DATA = await r.json();
    boot();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<p style="padding:80px 0;text-align:center;font-family:'Archivo Narrow',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#9e9890">
        Requires a local server or GitHub Pages.<br><br>
        Run: python3 -m http.server 8080
      </p>`;
  }
}

function allSpots() {
  return DATA.districts.flatMap(d => d.spots.map(s => ({...s, dId: d.id, dName: d.name})));
}

function boot() {
  buildNav();
  buildCatBar();
  buildBlocks();
  setStats();
  document.getElementById('searchInput').addEventListener('input', e => {
    q = e.target.value.toLowerCase().trim();
    render();
  });
  io();
}

function setStats() {
  const s = allSpots();
  document.getElementById('statSpots').textContent = s.length;
  document.getElementById('statMust').textContent  = s.filter(x => x.must).length;
  document.getElementById('statDist').textContent  = DATA.districts.length;
}

function buildNav() {
  const wrap = document.getElementById('navScroll');
  DATA.districts.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.district = d.id;
    btn.textContent = d.name
      .replace('Mexican & Latin', 'Mex & Latin')
      .replace(/\s?District$/i, '')
      .replace(/^Historic\s/i, '')
      .trim();
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeDist = d.id;
      render();
    });
    wrap.appendChild(btn);
  });
  wrap.querySelector('[data-district="all"]').addEventListener('click', () => {
    wrap.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    wrap.querySelector('[data-district="all"]').classList.add('active');
    activeDist = 'all';
    render();
  });
}

function buildCatBar() {
  const inner = document.getElementById('catInner');
  Object.entries(CAT_LABELS).forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = key;
    btn.innerHTML = (ICONS[key] || '') + label;
    btn.addEventListener('click', () => {
      inner.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = key;
      render();
    });
    inner.appendChild(btn);
  });
  inner.querySelector('[data-cat="all"]').addEventListener('click', () => {
    inner.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    inner.querySelector('[data-cat="all"]').classList.add('active');
    activeCat = 'all';
    render();
  });
}

function match(s, dId) {
  if (activeDist !== 'all' && activeDist !== dId) return false;
  if (activeCat  !== 'all' && activeCat  !== s.category) return false;
  if (q) {
    const hay = [s.name, s.category, s.note||'', dId, CAT_LABELS[s.category]||''].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function buildBlocks() {
  const wrap = document.getElementById('districtsWrap');
  DATA.districts.forEach(d => {
    const el = document.createElement('div');
    el.className = 'district-block';
    el.id = 'db-' + d.id;
    wrap.appendChild(el);
  });
  renderDistricts();
}

function render() { renderDistricts(); }

function renderDistricts() {
  let any = false;
  DATA.districts.forEach(d => {
    const el = document.getElementById('db-' + d.id);
    const hits = d.spots.filter(s => match(s, d.id));
    if (!hits.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    any = true;

    const mustN = hits.filter(s => s.must).length;
    const metaParts = [hits.length + ' spots'];
    if (mustN) metaParts.push(mustN + ' must visit');
    const wasCollapsed = el.classList.contains('collapsed');

    el.innerHTML = `
      <div class="district-hd" onclick="toggleBlock('${d.id}')">
        <div>
          <div class="d-title">${d.name}</div>
          <div class="d-meta">${metaParts.join(' &nbsp;·&nbsp; ')}</div>
          ${d.description ? `<div class="d-desc">${d.description}</div>` : ''}
        </div>
        <div class="d-right">
          <svg class="d-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="spots-grid">${hits.map(spotHTML).join('')}</div>
    `;
    if (wasCollapsed) el.classList.add('collapsed');
  });

  document.getElementById('emptyState').classList.toggle('vis', !any);
  io();
}

function spotHTML(s) {
  const st  = STATUS_CFG[s.status] || STATUS_CFG['open'];
  const ico = ICONS[s.category]    || ICONS.restaurant;
  const cat = CAT_LABELS[s.category] || s.category;
  const showHours = s.hours && !['Varies','TBD','Always','Annual','Monthly','Game days'].includes(s.hours);
  return `
<div class="spot-card">
  <div class="spot-top">
    <div class="spot-name">${s.name}</div>
    ${s.must ? `<div class="must-pip" title="Must Visit">${MUST_SVG}</div>` : ''}
  </div>
  <div class="spot-tags">
    <span class="stag">${ico}${cat}</span>
    <span class="dot-sep"></span>
    <span class="stag ${st.cls}">${st.label}</span>
  </div>
  ${showHours ? `<div class="spot-hours">${s.hours}</div>` : ''}
  ${s.note ? `<div class="spot-note">${s.note}</div>` : ''}
</div>`;
}

function toggleBlock(id) {
  document.getElementById('db-' + id).classList.toggle('collapsed');
}

function io() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); obs.unobserve(e.target); }});
  }, { threshold: 0.04 });
  document.querySelectorAll('.district-block:not(.vis)').forEach(b => obs.observe(b));
}

load();
</script>

</body>
